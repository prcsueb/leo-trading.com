<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leo-trading.com - Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Prevents scrollbars from the canvas */
        }
        /* Canvas is positioned behind all content */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #2a2a1a, #1a1a00, #000000);
        }
        /* Custom class for the glowing effect */
        .text-glow {
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3), 0 0 25px rgba(251, 191, 36, 0.7);
        }
        /* Keyframes for the floating animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="text-white">
    <!-- The animated background canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- Main content container -->
    <main class="relative flex flex-col items-center justify-center min-h-screen p-6 text-center">
        <div class="absolute inset-0 bg-black opacity-30"></div> <!-- Overlay for text readability -->
        <div class="relative z-10 animate-float">
            <!-- Main Title -->
            <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold tracking-wider text-glow">
                leo-trading<span class="text-yellow-400">.</span>com
            </h1>

            <!-- Subtitle -->
            <p class="mt-4 text-xl md:text-2xl font-light text-yellow-100">
                A new era of trading is on the horizon.
            </p>

            <!-- "Coming Soon" Badge -->
            <div class="mt-8">
                <span class="bg-yellow-400 text-gray-900 font-semibold px-6 py-3 rounded-full text-lg shadow-lg shadow-yellow-400/30">
                    COMING SOON
                </span>
            </div>
        </div>

    </main>

    <script>
        // --- Particle Animation Script ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const numParticles = 100;

        // Set canvas to full screen size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Particle object
        class Particle {
            constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }

            update() {
                this.draw();
                this.x += this.velocity.x;
                this.y += this.velocity.y;

                // Wall collision detection
                if (this.x - this.radius <= 0 || this.x + this.radius >= canvas.width) {
                    this.velocity.x = -this.velocity.x;
                }
                if (this.y - this.radius <= 0 || this.y + this.radius >= canvas.height) {
                    this.velocity.y = -this.velocity.y;
                }
            }
        }

        // Initialize particles
        function init() {
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                const radius = Math.random() * 2 + 1;
                const x = Math.random() * (canvas.width - radius * 2) + radius;
                const y = Math.random() * (canvas.height - radius * 2) + radius;
                const color = 'rgba(251, 191, 36, 0.7)'; // Brighter yellow accent color
                const velocity = {
                    x: (Math.random() - 0.5) * 0.5,
                    y: (Math.random() - 0.5) * 0.5
                };
                particles.push(new Particle(x, y, radius, color, velocity));
            }
        }

        // Connect particles with lines
        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    const distance = Math.sqrt(
                        Math.pow(particles[a].x - particles[b].x, 2) +
                        Math.pow(particles[a].y - particles[b].y, 2)
                    );

                    if (distance < 120) {
                        ctx.strokeStyle = 'rgba(251, 191, 36, 0.2)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                        ctx.closePath();
                    }
                }
            }
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
            });
            
            connectParticles();
        }

        // Start the animation
        init();
        animate();
    </script>
</body>
</html>
